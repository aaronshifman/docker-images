# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Pull Request Trigger

on:
  merge_group:
  pull_request:

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed-images }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/changed-images
        id: changed-files

  build:
    if: ${{ needs.setup.outputs.changed-files != '[]' }}
    name: Build ${{ matrix.image }}
    needs:
      - setup
    uses: ./.github/workflows/build.yaml
    permissions:
      contents: read
      packages: read
    secrets: inherit
    strategy:
      matrix:
        image: ${{ fromJSON(needs.setup.outputs.changed-files) }}
    with:
      image: ${{ matrix.image }}
      release: false # TODO: release pr-tagged images

  lint:
    if: ${{ needs.setup.outputs.changed-files != '[]' }}
    name: Lint ${{ matrix.image }}
    needs:
      - setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        image: ${{ fromJSON(needs.setup.outputs.changed-files) }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: images/${{ matrix.image }}/Dockerfile
          failure-threshold: style

  grype:
    if: ${{ github.event_name == 'pull_request' && needs.setup.outputs.changed-files != '[]' }}
    name: Scan ${{ matrix.image }}
    needs:
      - setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write
    strategy:
      matrix:
        image: ${{ fromJSON(needs.setup.outputs.changed-files) }}
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Get image settings
        id: image-settings
        uses: ./.github/actions/image-settings
        with:
          image: ${{ matrix.image }}

      - name: Docker Login
        uses: ./.github/actions/docker-login
        with:
          dhi-username: ${{ secrets.DOCKER_USER }}
          dhi-token: ${{ secrets.DOCKER_TOKEN }}

      - name: Build local image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: images/${{ matrix.image }}
          push: false
          load: true
          tags: localbuild/${{ matrix.image }}:latest
          build-args: |
            VERSION=${{ steps.image-settings.outputs.version }}
            VENDOR=${{ github.repository_owner }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/build_cache:${{ matrix.image }}-amd64,mode=max
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/build_cache:${{ matrix.image }}-amd64,mode=max,compression=zstd,force-compression=true

      - name: Scan with Grype
        continue-on-error: true
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: localbuild/${{ matrix.image }}:latest
          fail-build: false
          output-format: table
          output-file: ${{ runner.temp }}/grype-results.txt

      - name: Generate SBOM
        continue-on-error: true
        uses: anchore/sbom-action@28d71544de8eaf1b958d335707167c5f783590ad # v0.22.2
        with:
          image: localbuild/${{ matrix.image }}:latest
          format: syft-table
          output-file: ${{ runner.temp }}/sbom.txt
          upload-artifact: false
          dependency-snapshot: false

      - name: Format scan results
        if: always()
        run: |
          RESULTS="${{ runner.temp }}/grype-results.txt"
          SBOM="${{ runner.temp }}/sbom.txt"
          COMMENT="${{ runner.temp }}/grype-comment.md"
          IMAGE_SIZE=$(docker images localbuild/${{ matrix.image }}:latest --format "{{.Size}}" 2>/dev/null || echo "unknown")
          echo "### <img src=\"https://user-images.githubusercontent.com/5199289/136855393-d0a9eef9-ccf1-4e2b-9d7c-7aad16a567e5.png\" width=\"20\" align=\"absmiddle\"/> Grype Scan: \`${{ matrix.image }}\`" > "$COMMENT"
          echo "**Image size:** ${IMAGE_SIZE}" >> "$COMMENT"
          echo "" >> "$COMMENT"
          if [ -f "$RESULTS" ]; then
            echo '```' >> "$COMMENT"
            cat "$RESULTS" >> "$COMMENT"
            echo '```' >> "$COMMENT"
          else
            echo "_Scan failed to produce results — check the workflow logs._" >> "$COMMENT"
          fi
          if [ -f "$SBOM" ]; then
            PKG_COUNT=$(grep -c '.' "$SBOM" || true)
            echo "" >> "$COMMENT"
            echo "<details><summary>📦 SBOM — ${PKG_COUNT} packages</summary>" >> "$COMMENT"
            echo "" >> "$COMMENT"
            echo '```' >> "$COMMENT"
            cat "$SBOM" >> "$COMMENT"
            echo '```' >> "$COMMENT"
            echo "</details>" >> "$COMMENT"
          fi
          echo "" >> "$COMMENT"
          echo "_Advisory only — does not block merge._" >> "$COMMENT"

      - name: Post Scan Results
        if: always()
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v3.0.4
        with:
          header: grype-${{ matrix.image }}
          path: ${{ runner.temp }}/grype-comment.md
